<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doova — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --void:       #0e0d0c;
    --ember:      #f97316;
    --pulse:      #ec4899;
    --drift:      #8b5cf6;
    --haze:       #e8e0ff;
    --haze-dim:   rgba(232,224,255,0.55);
    --haze-faint: rgba(232,224,255,0.08);
    --grad: linear-gradient(135deg, var(--ember), var(--pulse), var(--drift));
  }

  html, body {
    height: 100%;
    background: var(--void);
    font-family: 'Outfit', sans-serif;
    color: var(--haze);
    overflow: hidden;
  }

  /* ── 星フィールド ── */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: var(--haze);
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    opacity: 0;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(1); }
    50%      { opacity: var(--op, 0.6); transform: scale(1.4); }
  }

  /* ── グラデーション光源 ── */
  .glow-orb {
    position: fixed; pointer-events: none; border-radius: 50%; filter: blur(120px); z-index: 0;
  }
  .glow-orb.a {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(249,115,22,0.18) 0%, transparent 70%);
    top: -120px; left: -100px;
    animation: drift-a 12s ease-in-out infinite;
  }
  .glow-orb.b {
    width: 460px; height: 460px;
    background: radial-gradient(circle, rgba(139,92,246,0.2) 0%, transparent 70%);
    bottom: -100px; right: -80px;
    animation: drift-b 14s ease-in-out infinite;
  }
  .glow-orb.c {
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(236,72,153,0.14) 0%, transparent 70%);
    top: 40%; left: 55%;
    animation: drift-c 10s ease-in-out infinite;
  }
  @keyframes drift-a { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
  @keyframes drift-b { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }
  @keyframes drift-c { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,20px)} }

  /* ── グリッドライン ── */
  .grid-lines {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(232,224,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,224,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* ── メインレイアウト ── */
  .page {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
  }

  /* ── カード ── */
  .card {
    width: 100%;
    max-width: 420px;
    background: rgba(14,13,12,0.7);
    border: 0.5px solid rgba(232,224,255,0.12);
    border-radius: 24px;
    padding: 3rem 2.5rem 2.5rem;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    animation: card-in 0.8s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── ロゴエリア ── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-bottom: 2.5rem;
    animation: fade-in 0.9s 0.15s both;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-icon {
    width: 64px; height: 64px;
    border-radius: 18px;
    background: var(--grad);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 32px rgba(236,72,153,0.3);
  }
  .logo-icon svg { width: 34px; height: 34px; }

  .logo-wordmark {
    font-family: 'Outfit', sans-serif;
    font-size: 42px;
    font-weight: 500;
    letter-spacing: -0.03em;
    color: var(--haze);
    line-height: 1;
  }
  .logo-wordmark .grad-text {
    background: var(--grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--haze-dim);
    margin-top: -4px;
  }

  /* ── 区切り ── */
  .divider {
    width: 48px; height: 0.5px;
    background: rgba(232,224,255,0.15);
    margin: 0 auto 2rem;
    animation: fade-in 0.9s 0.25s both;
  }

  /* ── サブコピー ── */
  .sub {
    text-align: center;
    font-size: 13.5px;
    color: var(--haze-dim);
    line-height: 1.65;
    margin-bottom: 2rem;
    animation: fade-in 0.9s 0.3s both;
  }

  /* ── Googleボタン ── */
  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px 20px;
    border-radius: 14px;
    border: 0.5px solid rgba(232,224,255,0.18);
    background: rgba(232,224,255,0.06);
    color: var(--haze);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    text-decoration: none;
    animation: fade-in 0.9s 0.4s both;
    position: relative;
    overflow: hidden;
  }
  .btn-google::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--grad);
    opacity: 0;
    transition: opacity 0.25s;
    border-radius: inherit;
  }
  .btn-google:hover {
    border-color: rgba(236,72,153,0.4);
    background: rgba(232,224,255,0.1);
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(139,92,246,0.2);
  }
  .btn-google:hover::before { opacity: 0.07; }
  .btn-google:active { transform: translateY(0) scale(0.99); }

  .btn-google .g-icon {
    width: 20px; height: 20px; flex-shrink: 0; position: relative; z-index: 1;
  }
  .btn-google span { position: relative; z-index: 1; }

  /* ── フッター ── */
  .footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 11px;
    color: rgba(232,224,255,0.25);
    letter-spacing: 0.04em;
    animation: fade-in 0.9s 0.55s both;
  }
  .footer a { color: rgba(232,224,255,0.4); text-decoration: none; }
  .footer a:hover { color: var(--haze-dim); }

  /* ── グラデーションボーダー（カード上端） ── */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: var(--grad);
    opacity: 0.5;
    border-radius: 99px;
  }
  .card { position: relative; }

  /* ── レスポンシブ ── */
  @media (max-width: 480px) {
    .card { padding: 2.5rem 1.75rem 2rem; border-radius: 20px; }
    .logo-wordmark { font-size: 36px; }
    .logo-icon { width: 56px; height: 56px; border-radius: 16px; }
  }
</style>
</head>
<body>

<!-- 星 -->
<div class="stars" id="stars"></div>

<!-- 光源 -->
<div class="glow-orb a"></div>
<div class="glow-orb b"></div>
<div class="glow-orb c"></div>

<!-- グリッド -->
<div class="grid-lines"></div>

<main class="page">
  <div class="card">

    <!-- ロゴ -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="17" cy="17" r="12" stroke="white" stroke-width="2.2" fill="none"/>
          <polyline points="11,17 15.5,21.5 24,12" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-wordmark">Doo<span class="grad-text">va</span></div>
      <p class="tagline">Do something. Reach nova.</p>
    </div>

    <div class="divider"></div>

    <p class="sub">Googleアカウントでログインして、<br>あなたの「やること」を星にしよう。</p>

    <!-- Googleログインボタン -->
    <a href="#" class="btn-google" role="button">
      <!-- Google公式SVGアイコン -->
      <svg class="g-icon" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M19.6 10.23c0-.68-.06-1.36-.17-2H10v3.79h5.4a4.6 4.6 0 01-2 3.02v2.5h3.24c1.9-1.75 3-4.33 3-7.31z" fill="#4285F4"/>
        <path d="M10 20c2.7 0 4.96-.9 6.62-2.43l-3.24-2.5c-.9.6-2.04.96-3.38.96-2.6 0-4.8-1.75-5.59-4.11H1.07v2.58A10 10 0 0010 20z" fill="#34A853"/>
        <path d="M4.41 11.92A5.97 5.97 0 014.1 10c0-.67.12-1.32.31-1.92V5.5H1.07A10 10 0 000 10c0 1.61.38 3.13 1.07 4.5l3.34-2.58z" fill="#FBBC05"/>
        <path d="M10 3.96c1.47 0 2.79.5 3.83 1.5l2.87-2.87C14.95.99 12.7 0 10 0A10 10 0 001.07 5.5l3.34 2.58C5.2 5.71 7.4 3.96 10 3.96z" fill="#EA4335"/>
      </svg>
      <span>Googleでログイン</span>
    </a>

    <div class="footer">
      ログインすることで<a href="#">利用規約</a>および<a href="#">プライバシーポリシー</a>に同意したことになります
    </div>

  </div>
</main>

<script>
  // 星を生成
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      --delay:-${(Math.random()*6).toFixed(1)}s;
      --op:${(Math.random()*0.5+0.2).toFixed(2)};
    `;
    container.appendChild(s);
  }
</script>
</body>
</html>
